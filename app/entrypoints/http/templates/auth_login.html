{% extends "base.html" %}
{% block content %}
<div class="max-w-md mx-auto bg-white rounded-lg border border-slate-200 p-6">
    <h1 class="text-2xl font-bold mb-4">Вход</h1>
    {% if errors %}
    <div class="bg-red-50 border border-red-200 rounded p-3 mb-4 text-sm text-red-700">
        <ul class="list-disc ml-5">{% for e in errors %}<li>{{ e }}</li>{% endfor %}</ul>
    </div>
    {% endif %}
    <form method="POST" class="space-y-4">
        <div>
            <label class="block text-sm font-semibold mb-1">Email</label>
            <input name="email" type="email" required value="{{ form_data.email or '' }}"
                   class="w-full px-3 py-2 border border-slate-300 rounded">
        </div>
        <div>
            <label class="block text-sm font-semibold mb-1">Пароль</label>
            <input name="password" type="password" required
                   class="w-full px-3 py-2 border border-slate-300 rounded">
        </div>
        <button type="submit" class="w-full px-6 py-3 bg-emerald-600 text-white font-semibold rounded-lg hover:bg-emerald-700">
            Войти
        </button>
        <p class="text-sm text-center text-slate-500">
            Нет аккаунта? <a href="/{{ lang }}/register" class="text-emerald-700 hover:underline">Зарегистрироваться</a>
        </p>
    </form>
</div>
{% endblock %}
